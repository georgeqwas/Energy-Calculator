<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizNest · Σύγκριση Ενέργειας</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<script src="data/tariffs.js"></script>
<style>
  :root{
    --brand:#b90016; --brand-dark:#8a0010; --brand-soft:#fdecee; --brand-line:#f5cdd2;
    --ink:#16161a; --ink-2:#5b5b64; --ink-3:#9a9aa3;
    --bg:#f5f5f6; --surface:#ffffff; --line:#ececee; --line-2:#e2e2e5;
    --pos:#0f8a5f; --pos-soft:#e7f6ef;
    --blue:#1f6fb2; --blue-soft:#e8f1f9; --amber:#b07d00; --amber-soft:#fbf2da; --green:#2f8f4e; --green-soft:#e8f5ec;
    --skel:#ececed; --sheen:rgba(0,0,0,.045); --herotint:#fbeff0;
    --r:14px; --r-sm:9px; --r-pill:999px;
    --sh:0 1px 2px rgba(20,20,30,.04), 0 6px 18px rgba(20,20,30,.05);
    --sh-h:0 2px 6px rgba(20,20,30,.07), 0 14px 32px rgba(20,20,30,.09);
  }
  :root[data-theme="dark"]{
    --brand:#ff4d5e; --brand-dark:#ff6f7d; --brand-soft:rgba(255,77,94,.16); --brand-line:rgba(255,77,94,.34);
    --ink:#f1f1f3; --ink-2:#b6b7be; --ink-3:#83848c;
    --bg:#0e0f12; --surface:#17191e; --line:#262830; --line-2:#343742;
    --pos:#3ec98f; --pos-soft:rgba(62,201,143,.16);
    --blue:#5fa9e6; --blue-soft:rgba(95,169,230,.18); --amber:#e0a93a; --amber-soft:rgba(224,169,58,.18); --green:#5ec77e; --green-soft:rgba(94,199,126,.18);
    --skel:#20232a; --sheen:rgba(255,255,255,.06); --herotint:#1c1418;
    --sh:0 1px 2px rgba(0,0,0,.4), 0 8px 22px rgba(0,0,0,.45);
    --sh-h:0 2px 8px rgba(0,0,0,.5), 0 16px 40px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;transition:background-color .3s,color .25s}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}
  ::selection{background:var(--brand-soft)}

  .topbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);transition:background-color .3s,border-color .3s}
  .topbar .in{max-width:1200px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:14px}
  .topbar img{height:27px;width:auto;display:block}
  .topbar .div{width:1px;height:22px;background:var(--line-2)}
  .topbar .ttl{font-size:14px;font-weight:500;color:var(--ink-2)}
  .topbar .src{margin-left:auto;font-size:11px;color:var(--ink-3);text-align:right;line-height:1.3}
  .topbar .sample{background:var(--amber-soft);color:var(--amber);font-weight:600;padding:2px 7px;border-radius:5px;font-size:10px}
  .iconbtn{width:36px;height:36px;border-radius:var(--r-sm);border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.18s}
  .iconbtn:hover{border-color:var(--brand-line);color:var(--brand);transform:translateY(-1px)}
  .role{font-size:12px;font-weight:500;background:var(--brand-soft);color:var(--brand);padding:6px 13px;border-radius:var(--r-pill);display:flex;align-items:center;gap:6px;border:1px solid var(--brand-line);white-space:nowrap}

  .wrap{max-width:1200px;margin:0 auto;padding:22px 22px 90px}
  .hero{background:var(--herotint);border:1px solid var(--line);border-radius:var(--r);padding:20px 24px;margin-bottom:18px;display:flex;align-items:center;gap:16px;transition:background-color .3s,border-color .3s}
  .hero .hic{width:46px;height:46px;border-radius:12px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;flex:none}
  .hero h1{font-size:21px;font-weight:700;letter-spacing:-.02em;margin:0 0 2px}
  .hero h1 .a{color:var(--brand)}
  .hero p{font-size:14px;color:var(--ink-2);margin:0}

  .controls{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;transition:background-color .3s,border-color .3s}
  .ctrl{display:flex;flex-direction:column;gap:6px}
  .ctrl>label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}
  .seg{display:inline-flex;background:var(--bg);border-radius:var(--r-pill);padding:4px;gap:3px;border:1px solid var(--line)}
  .seg button{border:0;background:transparent;font-family:inherit;font-size:14px;font-weight:500;color:var(--ink-2);padding:8px 16px;border-radius:var(--r-pill);cursor:pointer;display:flex;align-items:center;gap:7px;transition:.18s}
  .seg button.active{background:var(--brand);color:#fff;box-shadow:0 2px 8px color-mix(in srgb,var(--brand) 35%,transparent)}
  .seg.sm button{padding:7px 13px;font-size:13px}
  input,select{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line-2);border-radius:var(--r-sm);background:var(--surface);color:var(--ink);height:40px;transition:.15s}
  input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  input[type=number]{width:120px}

  .mobtoggle{display:none}
  .layout{display:grid;grid-template-columns:248px 1fr;gap:20px;margin-top:18px;align-items:start}
  .side{position:sticky;top:74px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:6px 0;display:flex;flex-direction:column;transition:background-color .3s,border-color .3s}
  .fgroup{padding:14px 16px;border-bottom:1px solid var(--line)}
  .fgroup:last-of-type{border-bottom:0}
  .fgroup h3{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin:0 0 11px}
  .fitem{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink-2);cursor:pointer;padding:5px 0;user-select:none;border-radius:6px;transition:.12s}
  .fitem:hover{color:var(--ink)}
  .fitem input{width:16px;height:16px;accent-color:var(--brand);cursor:pointer}
  .fitem .cnt{margin-left:auto;font-size:12px;color:var(--ink-3)}
  .fitem .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .clearf{margin:8px 16px 12px;font-size:12.5px;color:var(--brand);background:none;border:0;cursor:pointer;font-family:inherit;text-align:left;padding:0}

  .rbar{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .rbar .count{font-size:15px;font-weight:600}
  .rbar .count span{color:var(--ink-3);font-weight:400}
  .rbar .spacer{flex:1}
  .rbar .mini{font-size:12px;color:var(--ink-3)}
  .chipf{display:inline-flex;align-items:center;gap:6px;background:var(--brand-soft);color:var(--brand);font-size:12px;font-weight:500;padding:4px 6px 4px 11px;border-radius:var(--r-pill);border:1px solid var(--brand-line)}
  .chipf button{background:none;border:0;cursor:pointer;color:inherit;display:flex;padding:2px;border-radius:50%}

  .summary{display:none;margin-bottom:14px;background:var(--surface);border:1px solid var(--pos);border-left:4px solid var(--pos);border-radius:var(--r);padding:14px 18px;box-shadow:var(--sh);align-items:center;gap:15px;animation:fadeUp .35s ease both}
  .summary.show{display:flex}
  .summary .ic{width:42px;height:42px;border-radius:11px;background:var(--pos-soft);color:var(--pos);display:flex;align-items:center;justify-content:center;font-size:22px;flex:none}
  .summary .big{font-size:19px;font-weight:700;color:var(--pos)}
  .summary .sub{font-size:13.5px;color:var(--ink-2)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px;display:flex;flex-direction:column;gap:10px;position:relative;transition:box-shadow .18s,transform .18s,border-color .18s,background-color .3s}
  .card:hover{box-shadow:var(--sh-h);transform:translateY(-3px)}
  .card.best{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand),var(--sh)}
  .grid.anim .card{animation:fadeUp .34s cubic-bezier(.2,.7,.2,1) both}
  .grid.anim .card:nth-child(2){animation-delay:.03s}.grid.anim .card:nth-child(3){animation-delay:.06s}.grid.anim .card:nth-child(4){animation-delay:.09s}
  .grid.anim .card:nth-child(5){animation-delay:.12s}.grid.anim .card:nth-child(6){animation-delay:.15s}.grid.anim .card:nth-child(7){animation-delay:.18s}
  .grid.anim .card:nth-child(8){animation-delay:.21s}.grid.anim .card:nth-child(n+9){animation-delay:.24s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card .chead{display:flex;align-items:flex-start;gap:10px}
  .plogo{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;flex:none;position:relative;overflow:hidden}
  .plogo .ini{font-size:15px;font-weight:700}
  .plogo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff;padding:5px}
  .cmpchk{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-3);cursor:pointer;user-select:none}
  .cmpchk input{width:15px;height:15px;accent-color:var(--brand);cursor:pointer}
  .obadge{position:absolute;top:14px;right:14px;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:6px;background:var(--brand-soft);color:var(--brand);border:1px solid var(--brand-line)}
  .pname{font-size:15.5px;font-weight:600;line-height:1.3;min-height:40px}
  .tlabel{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:6px;width:fit-content}
  .t-fixed{background:var(--blue-soft);color:var(--blue)} .t-float{background:var(--amber-soft);color:var(--amber)} .t-special{background:var(--green-soft);color:var(--green)} .t-none{background:var(--bg);color:var(--ink-3)}
  .prices{display:flex;gap:8px;margin-top:2px}
  .pbox{flex:1;background:var(--bg);border-radius:var(--r-sm);padding:9px 10px;text-align:center;transition:background-color .3s}
  .pbox .v{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .pbox .u{font-size:10.5px;color:var(--ink-3);margin-top:1px}
  .mcost{display:flex;align-items:baseline;justify-content:space-between;padding:9px 11px;background:var(--brand-soft);border-radius:var(--r-sm)}
  .mcost .lab{font-size:12px;color:var(--brand)}
  .mcost .v{font-size:18px;font-weight:700;color:var(--brand)}
  .save{font-size:12.5px;font-weight:600}
  .save.pos{color:var(--pos)} .save.cur{color:var(--ink-3);font-weight:500}
  .foots{font-size:11px;color:var(--ink-3);min-height:14px}
  .cact{display:flex;gap:8px;margin-top:2px}
  .cbtn{flex:1;font-family:inherit;font-size:13px;font-weight:600;padding:9px;border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);display:flex;align-items:center;justify-content:center;gap:6px;transition:.16s}
  .cbtn:hover{border-color:var(--brand-line);color:var(--brand)}
  .cbtn.pri{background:var(--brand);color:#fff;border-color:var(--brand)}
  .cbtn.pri:hover{background:var(--brand-dark)}
  .cbtn:active{transform:scale(.97)}

  table.tv{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
  table.tv th,table.tv td{padding:11px 13px;text-align:left;font-size:13.5px;border-bottom:1px solid var(--line)}
  table.tv th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);font-weight:600;white-space:nowrap}
  table.tv tr:last-child td{border-bottom:0}
  table.tv tbody tr{transition:background-color .12s}
  table.tv tbody tr:hover{background:var(--bg)}
  table.tv .tprov{display:flex;align-items:center;gap:9px}
  table.tv .tprov .plogo{width:30px;height:30px;border-radius:7px}
  table.tv .num{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
  table.tv tr.best td{background:var(--brand-soft)}

  .empty{text-align:center;color:var(--ink-3);padding:50px 24px;background:var(--surface);border:1px dashed var(--line-2);border-radius:var(--r)}
  .empty i{font-size:40px;color:var(--line-2);display:block;margin-bottom:10px}
  .empty .t{font-size:15px;font-weight:600;color:var(--ink-2);margin-bottom:4px}
  .empty .s{font-size:13px}
  .more{margin:16px auto 0;display:block;font-family:inherit;font-size:14px;font-weight:600;padding:11px 26px;border-radius:var(--r-sm);border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);cursor:pointer;transition:.16s}
  .more:hover{border-color:var(--brand-line);color:var(--brand)}

  /* skeleton */
  .skel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);height:236px;position:relative;overflow:hidden}
  .skel::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,var(--sheen),transparent);animation:shimmer 1.3s infinite}
  @keyframes shimmer{100%{transform:translateX(100%)}}

  .cmpbar{position:fixed;left:50%;transform:translateX(-50%) translateY(160%);bottom:20px;z-index:50;background:var(--ink);color:var(--surface);border-radius:var(--r-pill);padding:9px 11px 9px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 12px 40px rgba(0,0,0,.3);transition:transform .28s cubic-bezier(.2,.8,.2,1)}
  .cmpbar.show{transform:translateX(-50%) translateY(0)}
  .cmpbar .txt{font-size:14px} .cmpbar .txt b{font-weight:700}
  .cmpbar .clear{font-size:13px;color:var(--ink-3);background:none;border:0;cursor:pointer;font-family:inherit}
  .cmpbar .go{background:var(--surface);color:var(--ink);border:0;font-family:inherit;font-size:14px;font-weight:600;padding:9px 17px;border-radius:var(--r-pill);cursor:pointer;display:flex;align-items:center;gap:6px}
  .overlay{position:fixed;inset:0;background:rgba(8,8,12,.55);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:38px 18px;overflow:auto;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay.show{display:flex}
  .drawer{background:var(--surface);border-radius:var(--r);max-width:820px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.4);overflow:hidden;animation:fadeUp .28s ease both}
  .drawer .dh{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--line)}
  .drawer .dh h3{font-size:17px;font-weight:600;margin:0}
  .drawer .dh .x{margin-left:auto;background:none;border:0;cursor:pointer;color:var(--ink-3);font-size:22px;display:flex}
  .ct{width:100%;border-collapse:collapse}
  .ct th,.ct td{padding:12px 15px;text-align:left;font-size:13.5px;border-bottom:1px solid var(--line)}
  .ct .rl{color:var(--ink-3);font-weight:500;width:160px}
  .ct td.win{background:var(--pos-soft);color:var(--pos);font-weight:700}
  .foot{margin-top:30px;font-size:12px;color:var(--ink-3);text-align:center;line-height:1.7}

  @media(max-width:840px){
    .layout{grid-template-columns:1fr}
    .side{position:fixed;top:0;left:0;bottom:0;width:280px;z-index:70;border-radius:0;transform:translateX(-105%);transition:transform .3s;overflow:auto}
    .side.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.4)}
    .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:69}
    .scrim.open{display:block}
    .mobtoggle{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:13px;font-weight:600;padding:9px 15px;border-radius:var(--r-sm);border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);cursor:pointer}
    .topbar .src{display:none}
  }
  @media(min-width:841px){.mobtoggle,.scrim{display:none!important}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="topbar">
  <div class="in">
    <img id="logoImg" src="logo/biznest-mark.png" alt="BizNest" onerror="this.outerHTML='<b style=&quot;font-size:18px&quot;>Biz<span style=&quot;color:var(--brand)&quot;>Nest</span></b>'">
    <div class="div"></div><span class="ttl">Σύγκριση ενέργειας</span>
    <span class="src" id="src"></span>
    <button class="iconbtn" id="theme" aria-label="Εναλλαγή θέματος" title="Φωτεινό / σκοτεινό"><i class="ti ti-moon"></i></button>
    <span class="role"><i class="ti ti-user-cog"></i> Υπάλληλος</span>
  </div>
</div>

<div class="wrap">
  <div class="hero">
    <div class="hic"><i class="ti ti-bolt"></i></div>
    <div><h1>Βρες το <span class="a">πιο συμφέρον</span> πρόγραμμα</h1>
    <p>Δεδομένα ΡΑΑΕΥ · τιμή κιλοβατώρας, πάγιο/μήνα και εκτιμώμενο μηνιαίο κόστος.</p></div>
  </div>

  <div class="controls">
    <div class="ctrl"><label>Ενέργεια</label>
      <div class="seg" id="seg"><button class="active" data-e="power"><i class="ti ti-bolt"></i> Ρεύμα</button><button data-e="gas"><i class="ti ti-flame"></i> Αέριο</button></div>
    </div>
    <div class="ctrl"><label>Τύπος παροχής</label>
      <div class="seg sm" id="use"><button class="active" data-u="home">Οικιακό</button><button data-u="biz">Επαγγελματικό</button></div>
    </div>
    <div class="ctrl"><label>Μηνιαία κατανάλωση (kWh)</label><input type="number" id="kwh" value="300" min="0" step="10"></div>
    <div class="ctrl"><label>Τρέχων πάροχος</label><select id="cur" style="min-width:170px"></select></div>
    <div class="ctrl"><label>Ταξινόμηση</label>
      <select id="sort"><option value="cost">Μηνιαίο κόστος ↑</option><option value="kwh">Τιμή κιλοβατώρας ↑</option><option value="fixed">Πάγιο/μήνα ↑</option></select>
    </div>
    <div class="ctrl"><label>Προβολή</label>
      <div class="seg sm" id="view"><button class="active" data-v="grid"><i class="ti ti-layout-grid"></i></button><button data-v="table"><i class="ti ti-table"></i></button></div>
    </div>
  </div>

  <div style="margin-top:14px"><button class="mobtoggle" id="mobF"><i class="ti ti-adjustments-horizontal"></i> Φίλτρα</button></div>

  <div class="layout">
    <div class="scrim" id="scrim"></div>
    <aside class="side" id="side"></aside>
    <main>
      <div class="summary" id="summary"></div>
      <div class="rbar">
        <div class="count" id="count"></div>
        <div id="chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        <div class="spacer"></div>
        <div class="mini" id="mini"></div>
      </div>
      <div id="results"></div>
    </main>
  </div>

  <div class="foot" id="foot"></div>
</div>

<div class="cmpbar" id="cmpbar">
  <span class="txt"><b id="cmpN">0</b> επιλεγμένα</span>
  <button class="clear" id="cmpClear">καθαρισμός</button>
  <button class="go" id="cmpGo"><i class="ti ti-columns"></i> Σύγκριση δίπλα-δίπλα</button>
</div>
<div class="overlay" id="overlay"><div class="drawer">
  <div class="dh"><i class="ti ti-columns" style="font-size:20px;color:var(--brand)"></i><h3>Σύγκριση προγραμμάτων</h3><button class="x" id="cmpX"><i class="ti ti-x"></i></button></div>
  <div style="overflow-x:auto"><table class="ct" id="cmpTable"></table></div>
</div></div>

<script>
const FALLBACK={generated_at:"—",source:"—",is_sample:true,regulated_estimate_eur_per_kwh:{power:0.05,gas:0.012},providers:{},categories:{power_home:[],power_biz:[],gas_home:[],gas_biz:[]}};
const T=window.TARIFFS||FALLBACK, PROV=T.providers||{}, REG=T.regulated_estimate_eur_per_kwh||{power:0.05,gas:0.012};
const DEF_KWH={power_home:300,power_biz:1500,gas_home:1000,gas_biz:3000};
const st={energy:"power",usetype:"home",types:new Set(),provs:new Set(),offers:new Set(),sort:"cost",view:"grid",cur:"",kwh:300,limit:24};
let CMP=new Set(), VIEW=[], animateNext=true;
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const fmt=n=>new Intl.NumberFormat("el-GR",{maximumFractionDigits:0}).format(Math.round(n));
const f2=n=>new Intl.NumberFormat("el-GR",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const f3=n=>new Intl.NumberFormat("el-GR",{minimumFractionDigits:5,maximumFractionDigits:5}).format(n||0).replace(/0+$/,"").replace(/[.,]$/,"");

/* theme */
function setTheme(dark){document.documentElement.setAttribute("data-theme",dark?"dark":"light");$("#theme").innerHTML=`<i class="ti ti-${dark?"sun":"moon"}"></i>`;const li=$("#logoImg");if(li)li.src=dark?"logo/biznest-mark-white.png":"logo/biznest-mark.png";try{localStorage.setItem("biznest-theme",dark?"dark":"light")}catch(e){}}
(function(){let d=false;try{const s=localStorage.getItem("biznest-theme");d=s?s==="dark":matchMedia("(prefers-color-scheme: dark)").matches}catch(e){}setTheme(d);})();
$("#theme").onclick=()=>setTheme(document.documentElement.getAttribute("data-theme")!=="dark");

function catKey(){return st.energy+"_"+(st.usetype==="home"?"home":"biz");}
function allRows(){return (T.categories[catKey()]||[]).filter(d=>d.available!==false);}
function meta(p){return PROV[p]||{slug:"",color:"#5b5b64"};}
function ini(n){const s=(n||"").replace(/[^Α-Ωα-ωΆ-Ώά-ώA-Za-z ]/g,"").trim().split(/\s+/);return ((s[0]&&s[0][0]||"")+(s[1]&&s[1][0]||s[0]&&s[0][1]||"")).toUpperCase();}
function logo(p){const m=meta(p);const img=m.slug?`<img src="providers/${m.slug}.png" alt="" loading="lazy" onerror="this.remove()">`:"";return `<div class="plogo" style="background:${m.color}"><span class="ini">${ini(p)}</span>${img}</div>`;}
function typeOf(d){if(d.type)return d.type;const s=((d.name||"")+" "+(d.notes||"")).toLowerCase();
  if(/σταθερ|stable|\bflat\b|\bfix|μπλε|blue/.test(s))return"fixed";
  if(/ειδικ|special|night|διζων|νυχτ|πράσιν|green/.test(s))return"special";
  if(/κυμαιν|value|save|variable|κίτριν|yellow|home|enter/.test(s))return"float";return"";}
const TL={fixed:["Μπλε / Σταθερό","t-fixed"],float:["Κίτρινο / Κυμαινόμενο","t-float"],special:["Πράσινο / Ειδικό","t-special"],"":["—","t-none"]};
function monthly(d){const rate=d.rate||0,fx=d.fixed||0,reg=REG[st.energy]||0;return fx+(rate+reg)*st.kwh;}

function fillCur(){const s=$("#cur");const list=[...new Set(allRows().map(d=>d.prov))].sort();s.innerHTML='<option value="">— τρέχων πάροχος —</option>'+list.map(p=>`<option>${p}</option>`).join("");}

function buildSidebar(){
  const data=allRows();
  const byType={fixed:0,float:0,special:0},byProv={};
  data.forEach(d=>{const t=typeOf(d);if(byType[t]!=null)byType[t]++;byProv[d.prov]=(byProv[d.prov]||0)+1;});
  const offers=[["zerofix","Μηδενικό πάγιο",d=>(d.fixed||0)===0],["disc","Με έκπτωση συνέπειας",d=>!!(d.disc_cond||d.has_discount)]];
  const byOffer={};offers.forEach(([k,,fn])=>byOffer[k]=data.filter(fn).length);
  const typeRow=k=>`<label class="fitem"><input type="checkbox" data-f="type" value="${k}" ${st.types.has(k)?"checked":""}><span class="dot" style="background:${k==='fixed'?'var(--blue)':k==='float'?'var(--amber)':'var(--green)'}"></span>${TL[k][0]}<span class="cnt">${byType[k]}</span></label>`;
  const provRows=Object.keys(byProv).sort().map(p=>`<label class="fitem"><input type="checkbox" data-f="prov" value="${p}" ${st.provs.has(p)?"checked":""}>${p}<span class="cnt">${byProv[p]}</span></label>`).join("");
  const offerRows=offers.map(([k,lab])=>`<label class="fitem"><input type="checkbox" data-f="offer" value="${k}" ${st.offers.has(k)?"checked":""}>${lab}<span class="cnt">${byOffer[k]}</span></label>`).join("");
  $("#side").innerHTML=`
    <div class="fgroup"><h3>Τύπος τιμολογίου</h3>${typeRow("fixed")}${typeRow("float")}${typeRow("special")}</div>
    <div class="fgroup"><h3>Πάροχος</h3><div style="max-height:260px;overflow:auto">${provRows}</div></div>
    <div class="fgroup"><h3>Είδος προσφοράς</h3>${offerRows}</div>
    <button class="clearf" id="clearf">Καθαρισμός φίλτρων</button>`;
  $$('#side input[data-f]').forEach(c=>c.onchange=()=>{const set=c.dataset.f==="type"?st.types:c.dataset.f==="prov"?st.provs:st.offers;c.checked?set.add(c.value):set.delete(c.value);render();});
  $("#clearf").onclick=()=>{st.types.clear();st.provs.clear();st.offers.clear();buildSidebar();render();};
}

function compute(){
  let data=allRows().map(d=>({d,t:typeOf(d),m:monthly(d)}));
  if(st.types.size)data=data.filter(x=>st.types.has(x.t));
  if(st.provs.size)data=data.filter(x=>st.provs.has(x.d.prov));
  if(st.offers.has("zerofix"))data=data.filter(x=>(x.d.fixed||0)===0);
  if(st.offers.has("disc"))data=data.filter(x=>!!(x.d.disc_cond||x.d.has_discount));
  const key=st.sort==="kwh"?(x=>x.d.rate):st.sort==="fixed"?(x=>x.d.fixed||0):(x=>x.m);
  data.sort((a,b)=>key(a)-key(b));return data;
}

function render(){
  const data=compute(); VIEW=data;
  const cheapest=data.length?Math.min(...data.map(x=>x.m)):0;
  const curRow=data.find(x=>x.d.prov===st.cur), curM=curRow?curRow.m:null;
  $("#count").innerHTML=`${data.length} <span>${st.energy==="gas"?"τιμολόγια αερίου":"τιμολόγια ρεύματος"}</span>`;
  $("#mini").textContent=`${fmt(st.kwh)} kWh/μήνα · +ρυθμιζόμενες ~${f2(REG[st.energy])}€/kWh`;
  const chips=[...st.types].map(t=>['type',t,TL[t][0]]).concat([...st.provs].map(p=>['prov',p,p]),[...st.offers].map(o=>['offer',o,o==='zerofix'?'Μηδενικό πάγιο':'Έκπτωση συνέπειας']));
  $("#chips").innerHTML=chips.map(([f,v,l])=>`<span class="chipf">${l}<button data-f="${f}" data-v="${v}"><i class="ti ti-x" style="font-size:13px"></i></button></span>`).join("");
  $$('#chips button').forEach(b=>b.onclick=()=>{(b.dataset.f==="type"?st.types:b.dataset.f==="prov"?st.provs:st.offers).delete(b.dataset.v);buildSidebar();render();});
  const sm=$("#summary"),best=data[0];
  if(best&&curM!=null&&best.d.prov!==st.cur&&curM-best.m>0){sm.className="summary show";sm.innerHTML=`<div class="ic"><i class="ti ti-trending-down"></i></div><div><div class="big">Έως ${fmt(curM-best.m)}€/μήνα εξοικονόμηση</div><div class="sub">Από <b>${st.cur}</b> σε <b>${best.d.prov} · ${best.d.name}</b> — ~${fmt((curM-best.m)*12)}€ τον χρόνο.</div></div>`;}
  else if(curM!=null&&best&&best.d.prov===st.cur){sm.className="summary show";sm.innerHTML=`<div class="ic" style="background:var(--blue-soft);color:var(--blue)"><i class="ti ti-circle-check"></i></div><div><div class="big" style="color:var(--blue)">Ήδη στο πιο συμφέρον</div><div class="sub">Ο <b>${st.cur}</b> είναι ήδη η φθηνότερη επιλογή.</div></div>`;}
  else sm.className="summary";
  if(!data.length){$("#results").innerHTML='<div class="empty"><i class="ti ti-mood-empty"></i><div class="t">Κανένα τιμολόγιο</div><div class="s">Δοκίμασε να καθαρίσεις κάποια φίλτρα.</div></div>';return;}
  st.view==="table"?renderTable(data,cheapest,curM):renderGrid(data,cheapest,curM);
}

function badgeOf(x,cheapest){if(Math.abs(x.m-cheapest)<1e-9)return'<span class="obadge"><i class="ti ti-trophy"></i> Πιο συμφέρον</span>';if((x.d.fixed||0)===0)return'<span class="obadge" style="background:var(--green-soft);color:var(--green);border-color:transparent">Μηδενικό πάγιο</span>';return"";}
function saveOf(x,curM){if(x.d.prov===st.cur)return'<div class="save cur">τρέχων πάροχος</div>';if(curM==null)return'<div class="save cur">—</div>';const s=curM-x.m;return s>0?`<div class="save pos"><i class="ti ti-arrow-down-right"></i> −${fmt(s)}€/μήνα</div>`:`<div class="save cur">+${fmt(-s)}€/μήνα</div>`;}

function renderGrid(data,cheapest,curM){
  const slice=data.slice(0,st.limit);
  $("#results").innerHTML=`<div class="grid${animateNext?' anim':''}">`+slice.map(x=>{const d=x.d,tl=TL[x.t];
    return `<div class="card ${Math.abs(x.m-cheapest)<1e-9?'best':''}">
      ${badgeOf(x,cheapest)}
      <div class="chead">${logo(d.prov)}<label class="cmpchk"><input type="checkbox" data-p="${d.prov}|${d.name}" ${CMP.has(d.prov+'|'+d.name)?'checked':''}> Σύγκριση</label></div>
      <div class="pname">${d.name||d.prov}</div>
      <span class="tlabel ${tl[1]}">${d.prov} · ${tl[0]}</span>
      <div class="prices"><div class="pbox"><div class="v">${f3(d.rate)}€</div><div class="u">/kWh</div></div><div class="pbox"><div class="v">${f2(d.fixed)}€</div><div class="u">πάγιο/μήνα</div></div></div>
      <div class="mcost"><span class="lab">Εκτιμ. μηνιαίο κόστος</span><span class="v">${fmt(x.m)}€</span></div>
      ${saveOf(x,curM)}
      <div class="foots">${d.disc_cond?'* '+d.disc_cond:(d.duration?'Διάρκεια: '+d.duration:'')}</div>
      <div class="cact"><button class="cbtn" onclick='alert(${JSON.stringify(detail(d,x))})'><i class="ti ti-info-circle"></i> Λεπτομέρειες</button><button class="cbtn pri" onclick='copyOne(${JSON.stringify(d.prov+" · "+d.name)})'><i class="ti ti-copy"></i> Αντιγραφή</button></div>
    </div>`;}).join("")+'</div>'+(data.length>st.limit?`<button class="more" id="more">Δείξε όλα (${data.length})</button>`:"");
  if($("#more"))$("#more").onclick=()=>{st.limit=9999;animateNext=false;render();};
  animateNext=false; bindCmp();
}
function renderTable(data,cheapest,curM){
  $("#results").innerHTML=`<table class="tv"><thead><tr><th></th><th>Πάροχος / πρόγραμμα</th><th>Τύπος</th><th class="num">€/kWh</th><th class="num">Πάγιο/μήνα</th><th class="num">Μηνιαίο κόστος</th><th class="num">vs τρέχων</th></tr></thead><tbody>`+
    data.map(x=>{const d=x.d,best=Math.abs(x.m-cheapest)<1e-9,s=curM!=null?curM-x.m:null;
    return `<tr class="${best?'best':''}"><td><input type="checkbox" data-p="${d.prov}|${d.name}" ${CMP.has(d.prov+'|'+d.name)?'checked':''} style="accent-color:var(--brand)"></td>
      <td><div class="tprov">${logo(d.prov)}<div><div style="font-weight:600">${d.name||d.prov}</div><div style="font-size:11.5px;color:var(--ink-3)">${d.prov}</div></div></div></td>
      <td><span class="tlabel ${TL[x.t][1]}">${TL[x.t][0]}</span></td>
      <td class="num">${f3(d.rate)}€</td><td class="num">${f2(d.fixed)}€</td><td class="num">${fmt(x.m)}€${best?' 🏆':''}</td>
      <td class="num" style="color:${s>0?'var(--pos)':'var(--ink-3)'}">${s==null?'—':(s>0?'−'+fmt(s):'+'+fmt(-s))+'€'}</td></tr>`;}).join("")+'</tbody></table>';
  animateNext=false; bindCmp();
}
function detail(d,x){return `${d.prov} · ${d.name}\n\nΤιμή κιλοβατώρας: ${f3(d.rate)} €/kWh\nΠάγιο: ${f2(d.fixed)} €/μήνα\nΕκτιμ. μηνιαίο κόστος (${st.kwh} kWh): ${fmt(x.m)}€\nΔιάρκεια: ${d.duration||'—'}\n${d.disc_cond?'Έκπτωση: '+d.disc_cond+'\n':''}${d.notes?'\nΠαρατηρήσεις: '+d.notes:''}`;}
function copyOne(t){navigator.clipboard?.writeText("BizNest · "+t);}

function bindCmp(){$$('#results input[data-p]').forEach(cb=>cb.onchange=()=>{if(cb.checked){if(CMP.size>=3){cb.checked=false;return;}CMP.add(cb.dataset.p);}else CMP.delete(cb.dataset.p);bar();});}
function bar(){const n=CMP.size;$("#cmpN").textContent=n;$("#cmpbar").classList.toggle('show',n>=1);$("#cmpGo").disabled=n<2;$("#cmpGo").style.opacity=n<2?.5:1;}
$("#cmpClear").onclick=()=>{CMP.clear();$$('#results input[data-p]').forEach(c=>c.checked=false);bar();};
$("#cmpGo").onclick=()=>{if(CMP.size<2)return;buildCmp();$("#overlay").classList.add('show');};
$("#cmpX").onclick=()=>$("#overlay").classList.remove('show');
$("#overlay").onclick=e=>{if(e.target.id==='overlay')$("#overlay").classList.remove('show');};
function buildCmp(){const sel=VIEW.filter(x=>CMP.has(x.d.prov+'|'+x.d.name));
  const rows=[["Τύπος",x=>TL[x.t][0]],["Τιμή €/kWh",x=>f3(x.d.rate)+'€',x=>x.d.rate,'low'],["Πάγιο/μήνα",x=>f2(x.d.fixed)+'€',x=>x.d.fixed||0,'low'],["Μηνιαίο κόστος",x=>fmt(x.m)+'€',x=>x.m,'low'],["Διάρκεια",x=>x.d.duration||'—']];
  let h='<thead><tr><th class="rl"></th>'+sel.map(x=>`<th><div class="tprov">${logo(x.d.prov)}<div><div style="font-weight:600">${x.d.prov}</div><div style="font-size:11.5px;color:var(--ink-3)">${x.d.name}</div></div></div></th>`).join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{let bv=null;if(r[3]){const v=sel.map(r[2]);bv=Math.min(...v);}h+=`<tr><td class="rl">${r[0]}</td>`+sel.map(x=>{const w=r[3]&&Math.abs(r[2](x)-bv)<1e-9;return `<td class="${w?'win':''}">${r[1](x)}</td>`;}).join('')+'</tr>';});
  $("#cmpTable").innerHTML=h+'</tbody>';}

function skeleton(){$("#results").innerHTML='<div class="grid">'+Array(8).fill('<div class="skel"></div>').join('')+'</div>';}

$$("#seg button").forEach(b=>b.onclick=()=>{$$("#seg button").forEach(x=>x.classList.remove("active"));b.classList.add("active");st.energy=b.dataset.e;onCat();});
$$("#use button").forEach(b=>b.onclick=()=>{$$("#use button").forEach(x=>x.classList.remove("active"));b.classList.add("active");st.usetype=b.dataset.u;onCat();});
$$("#view button").forEach(b=>b.onclick=()=>{$$("#view button").forEach(x=>x.classList.remove("active"));b.classList.add("active");st.view=b.dataset.v;render();});
$("#sort").onchange=e=>{st.sort=e.target.value;render();};
$("#kwh").oninput=e=>{st.kwh=parseFloat(e.target.value)||0;render();};
$("#cur").onchange=e=>{st.cur=e.target.value;render();};
$("#mobF").onclick=()=>{$("#side").classList.add("open");$("#scrim").classList.add("open");};
$("#scrim").onclick=()=>{$("#side").classList.remove("open");$("#scrim").classList.remove("open");};
function onCat(){st.types.clear();st.provs.clear();st.offers.clear();st.cur="";st.limit=24;st.kwh=DEF_KWH[catKey()];$("#kwh").value=st.kwh;CMP.clear();bar();fillCur();buildSidebar();animateNext=true;skeleton();setTimeout(render,300);}

$("#src").innerHTML=`Πηγή: ${T.source} · ${T.generated_at}`+(T.is_sample?` <span class="sample">SAMPLE</span>`:"");
$("#foot").innerHTML=(T.is_sample?"⚠ Δείγμα δεδομένων — τρέξε τον scraper για πραγματικά τιμολόγια.<br>":"")+`Δεδομένα: ${T.source} · ${T.generated_at} · Οι τιμές €/kWh & πάγιο είναι από ΡΑΑΕΥ· το μηνιαίο κόστος περιλαμβάνει εκτίμηση ρυθμιζόμενων χρεώσεων. · BizNest`;
onCat();
</script>
</body>
</html>
